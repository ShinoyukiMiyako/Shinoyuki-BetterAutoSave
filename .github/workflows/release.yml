name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run: 仅构建 + 校验, 不创建 release (jar 作为 workflow artifact 下载)'
        type: boolean
        default: false
      prerelease:
        description: '预发布: 标记为 pre-release (测试版, 不作为 Latest 推给用户)'
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 需要完整 tag 历史用于 "tag 已存在" 守卫
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Read mod version from gradle.properties
        id: version
        run: |
          VERSION=$(grep '^mod_version=' gradle.properties | cut -d= -f2-)
          if [ -z "$VERSION" ]; then
            echo "::error::mod_version not found in gradle.properties"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected mod_version: $VERSION"

      - name: Verify tag and release do not exist yet
        if: inputs.dry_run == false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists locally. Bump mod_version in gradle.properties before publishing."
            exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists on GitHub."
            exit 1
          fi

      - name: Verify release notes file exists
        id: notes
        run: |
          NOTES_FILE="release-notes/${{ steps.version.outputs.tag }}.md"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "::error::Release notes not found at $NOTES_FILE. Create the file (matching the tag) before triggering."
            exit 1
          fi
          echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Build Forge 1.20.1 mod jar
        # 只构建 forge 模块。NeoForge 1.21.1 构建暂不随版发布 (未做真机回归), 多模块下
        # ./gradlew build 会连带构建 neoforge, 故显式只跑 :forge:build。
        run: ./gradlew :forge:build --no-daemon

      - name: Verify jar artifact
        id: jar
        run: |
          # 必须发自包含 fat jar (-all): 内嵌 MixinExtras, 否则真服加载异步加载/在线回退的
          # @WrapOperation mixin 会 ClassNotFoundException 崩溃。thin jar (无 -all) 仅供 mcmodsrepo
          # 给 BetterBackup 编译期消费, 绝不作为发布产物 (v0.13.0-beta.1 误发 thin jar 即此教训)。
          JAR="forge/build/libs/shinoyuki_betterautosave-${{ steps.version.outputs.version }}-all.jar"
          if [ ! -f "$JAR" ]; then
            echo "::error::Expected fat jar not found: $JAR"
            ls -la forge/build/libs/ || true
            exit 1
          fi
          echo "path=$JAR" >> "$GITHUB_OUTPUT"
          echo "Built: $JAR ($(du -h "$JAR" | cut -f1))"

      - name: Upload jar as workflow artifact (dry-run only)
        if: inputs.dry_run == true
        uses: actions/upload-artifact@v4
        with:
          name: shinoyuki_betterautosave-${{ steps.version.outputs.version }}
          path: ${{ steps.jar.outputs.path }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: inputs.dry_run == false
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: BetterAutoSave ${{ steps.version.outputs.tag }} — Forge 1.20.1 异步存档优化
          body_path: ${{ steps.notes.outputs.path }}
          files: ${{ steps.jar.outputs.path }}
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ inputs.prerelease }}
