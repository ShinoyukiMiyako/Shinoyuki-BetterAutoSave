name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run: 仅构建 + 校验, 不创建 release (jar 作为 workflow artifact 下载)'
        type: boolean
        default: false
      prerelease:
        description: '预发布: 标记为 pre-release (测试版, 不作为 Latest 推给用户)'
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 需要完整 tag 历史用于 "tag 已存在" 守卫
          fetch-depth: 0

      - name: Set up JDK 17 and 21
        # forge / common 子模块 toolchain Java 17, neoforge 子模块 toolchain Java 21 (NeoForge 1.21.1 要求)。
        # 两个都装, Gradle toolchain 按模块自动选对应 JDK; JAVA_HOME 取最后一个 (21) 作 Gradle 运行时,
        # 与本地一致 (Gradle on 21 + forge 走 17 toolchain, FG6 在 21 运行时已验证可构建)。
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            17
            21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Read mod version from gradle.properties
        id: version
        run: |
          VERSION=$(grep '^mod_version=' gradle.properties | cut -d= -f2-)
          if [ -z "$VERSION" ]; then
            echo "::error::mod_version not found in gradle.properties"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected mod_version: $VERSION"

      - name: Verify tag and release do not exist yet
        if: inputs.dry_run == false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists locally. Bump mod_version in gradle.properties before publishing."
            exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists on GitHub."
            exit 1
          fi

      - name: Verify release notes file exists
        id: notes
        run: |
          NOTES_FILE="release-notes/${{ steps.version.outputs.tag }}.md"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "::error::Release notes not found at $NOTES_FILE. Create the file (matching the tag) before triggering."
            exit 1
          fi
          # 英文发行说明供 Modrinth 发布用 (面向国际用户); 缺失则提前失败, 不让发版半途 (GitHub release 已建) 才炸。
          EN_NOTES="release-notes/${{ steps.version.outputs.tag }}.en.md"
          if [ ! -f "$EN_NOTES" ]; then
            echo "::error::English release notes not found at $EN_NOTES (required for the Modrinth publish step)."
            exit 1
          fi
          echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Build Forge 1.20.1 + NeoForge 1.21.1 mod jars
        # 双端构建。entity 终态接力修复两端均经真机回归 (forge 1.20.1 测试服 + neoforge 1.21.1
        # runServer, 见 v0.16.1 发行说明), 故 0.16.1 起 neoforge 随版发布。
        run: ./gradlew :forge:build :neoforge:build --no-daemon

      - name: Verify jar artifacts
        id: jar
        run: |
          # Forge 必须发自包含 fat jar (-all): 内嵌 MixinExtras, 否则真服加载异步加载/在线回退的
          # @WrapOperation mixin 会 ClassNotFoundException 崩溃。thin jar (无 -all) 仅供 mcmodsrepo
          # 给 BetterBackup 编译期消费, 绝不作为发布产物 (v0.13.0-beta.1 误发 thin jar 即此教训)。
          FORGE_JAR="forge/build/libs/shinoyuki_betterautosave-${{ steps.version.outputs.version }}-all.jar"
          if [ ! -f "$FORGE_JAR" ]; then
            echo "::error::Expected forge fat jar not found: $FORGE_JAR"
            ls -la forge/build/libs/ || true
            exit 1
          fi
          # NeoForge (MDG) 产单 jar, jarJar 内嵌依赖, 无 -all/thin 之分。
          NEOFORGE_JAR="neoforge/build/libs/shinoyuki_betterautosave-neoforge-${{ steps.version.outputs.version }}.jar"
          if [ ! -f "$NEOFORGE_JAR" ]; then
            echo "::error::Expected neoforge jar not found: $NEOFORGE_JAR"
            ls -la neoforge/build/libs/ || true
            exit 1
          fi
          echo "forge_path=$FORGE_JAR" >> "$GITHUB_OUTPUT"
          echo "neoforge_path=$NEOFORGE_JAR" >> "$GITHUB_OUTPUT"
          echo "Built forge:    $FORGE_JAR ($(du -h "$FORGE_JAR" | cut -f1))"
          echo "Built neoforge: $NEOFORGE_JAR ($(du -h "$NEOFORGE_JAR" | cut -f1))"

      - name: Upload jars as workflow artifact (dry-run only)
        if: inputs.dry_run == true
        uses: actions/upload-artifact@v4
        with:
          name: shinoyuki_betterautosave-${{ steps.version.outputs.version }}
          path: |
            ${{ steps.jar.outputs.forge_path }}
            ${{ steps.jar.outputs.neoforge_path }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: inputs.dry_run == false
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: BetterAutoSave ${{ steps.version.outputs.tag }} — Forge 1.20.1 / NeoForge 1.21.1 异步存档优化
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            ${{ steps.jar.outputs.forge_path }}
            ${{ steps.jar.outputs.neoforge_path }}
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ inputs.prerelease }}

      # 同步发布到 Modrinth (项目 shinoyuki-betterautosave)。发的是同一个自包含 fat jar + 同一份发行说明。
      # version-type 跟随 prerelease 勾选: 预发布 -> beta 通道, 正式 -> release 通道。
      # env.MODRINTH_TOKEN 为空时整步跳过 (fork 或未配 secret 不会让发版失败)。
      - name: Publish to Modrinth
        if: inputs.dry_run == false && env.MODRINTH_TOKEN != ''
        uses: Kir-Antipov/mc-publish@v3
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        with:
          modrinth-id: shinoyuki-betterautosave
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          # 单个 Modrinth 版本号同时挂两端 jar (forge -all + neoforge), loaders / game-versions 取并集。
          # 首个文件 (forge -all.jar) 为 primary; 用户按 加载器+MC版本 过滤后下对应文件。
          files: |
            ${{ steps.jar.outputs.forge_path }}
            ${{ steps.jar.outputs.neoforge_path }}
          name: BetterAutoSave ${{ steps.version.outputs.tag }}
          version: ${{ steps.version.outputs.version }}
          version-type: ${{ inputs.prerelease && 'beta' || 'release' }}
          # Modrinth 面向国际用户, changelog 用英文 .en.md (GitHub release 正文仍用中文 .md)。
          changelog-file: release-notes/${{ steps.version.outputs.tag }}.en.md
          loaders: |
            forge
            neoforge
          game-versions: |
            1.20.1
            1.21.1
