name: 问题反馈 / Bug 报告
description: 报告崩溃、卡顿、存档异常或其它 BUG
labels: ["needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        提交前请尽量填全以下信息。环境与版本缺失会显著拖慢定位 —— 很多问题在新版本里已经修好，请先确认你用的是最新正式版。
        带「必填」的项目请务必提供。

  - type: dropdown
    id: suspected-category
    attributes:
      label: 你觉得可能是哪类问题？
      description: 只是你的初步判断，最终以实际内容为准，分诊时会重新归类。
      options:
        - 崩溃 / watchdog 强杀
        - 卡顿 / 掉 TPS / 性能
        - 数据丢失 / 存档损坏
        - 用法疑问
        - 其它 / 暂不确定
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 简述发生了什么（崩溃 / 卡顿 / 数据丢失 / watchdog 强杀 等）。
    validations:
      required: true

  - type: input
    id: bas-version
    attributes:
      label: BetterAutoSave 版本（必填）
      placeholder: 例 0.12.0，请确认是当前最新正式版
    validations:
      required: true

  - type: input
    id: mc-loader
    attributes:
      label: Minecraft 版本与加载器（必填）
      placeholder: 例 1.20.1 Forge 47.4.20 / 1.21.1 NeoForge 21.1.x（经 Sinytra Connector 加载也请注明）
    validations:
      required: true

  - type: input
    id: java-runtime
    attributes:
      label: Java 版本 / 运行环境
      placeholder: 例 Java 21，服务端 / 单人

  - type: textarea
    id: logs
    attributes:
      label: 日志 / 崩溃报告 / spark（必填）
      description: |
        把完整 latest.log（崩溃时再附 crash-reports 里对应文件）传到 https://mclo.gs 后贴链接，不要直接粘贴整份。
        卡顿 / 掉 TPS 类：请在卡顿前后跑一次 /spark profiler，贴 spark 报告链接，对定位帮助很大。
      placeholder: mclo.gs 链接、spark 链接…
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤 / 触发场景
      description: 问题发生前在做什么？是否在执行 /save-all、定时备份、关服、预生成等。能稳定复现请写出步骤。

  - type: textarea
    id: other-mods
    attributes:
      label: 其它存档 / 区块相关 mod
      description: 是否同时安装了改写存档或区块逻辑的 mod（如 Fast Async World Save、ServerCore、C2ME、Chunky 等）？同类叠加可能产生 Mixin 冲突，请如实列出。

  - type: textarea
    id: bas-config
    attributes:
      label: BAS 配置
      description: 若改过 betterautosave 配置，贴出 common.toml 的相关片段；使用默认配置请注明「默认」。
